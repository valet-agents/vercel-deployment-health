name: vercel-deployment-health
display_name: Vercel Deployment Health
description: >-
  Every day, reviews the day's Vercel production deploys — perf
  and error rate vs the prior healthy deploy — and posts a
  rollback recommendation if anything regresses.
category: engineering

example:
  prompt: "Anything off about the last release?"

story:
  hero: "Your deploys, reviewed every day."
  subheadline: >-
    Every day, reviews the day's deploys — perf and error rate
    against baseline — and posts a rollback recommendation if
    anything regresses.
  steps:
    - role: trigger
      title: "Every morning."
      body: >-
        The heartbeat fires once a day and reviews every
        production deploy that landed since the last run.
    - role: action
      title: "It diffs perf and error-rate against the last good deploy."
      body: >-
        For each deploy in the batch, compares error rate, p95
        latency, and build duration — with floors so noise
        doesn't fire.
      catalog: vercel-mcp
    - role: outcome
      title: "Green tick or rollback recommendation, in Slack."
      body: >-
        Clean days get a tick. Any regression in the batch gets a
        rollback rec with the prior good deploy id. Never
        auto-rolls back.
      catalog: slack

connectors:
  - catalog: vercel-mcp
    description: >-
      The Vercel MCP server, OAuth-authenticated. The agent uses
      it to list production deploys, pull deploy metadata
      (commit, author, branch, build duration), pull recent
      analytics and logs for error-rate / perf diffs, and (only
      on explicit Slack confirmation) trigger rollbacks or
      redeploys.
    ui:
      headline: "Connect Vercel with one click."
      blurb: >-
        OAuth into Vercel — no API token to paste. The agent uses
        your project permissions to read deploys and metrics, and
        only writes (rollback / redeploy) when you confirm in
        Slack.
      done_note: "Vercel connected"

channels:
  - catalog: slack
    description: >-
      The agent gets its own Slack bot. Invite it to whichever
      channels you want deploy alerts in, and to any other
      channel where teammates should be able to @mention it for
      ad-hoc Vercel questions.
    ui:
      headline: "Give Deployment Health a Slack bot."
      blurb: >-
        The agent posts each deploy result to every channel you
        invite it to. Invite it to one focused deploys channel,
        or several — whatever matches how your team works.
      done_note: "Bot ready — invite it to a channel"

  - type: heartbeat
    every: 24h
    description: "Polls watched Vercel project(s) once a day for new production deploys to evaluate."
